<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LifeSim</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-shell">
    <div class="game-header">
      <div class="game-title">
        <span class="game-name">LifeSim</span>
        <span id="ageLabel" class="age-label">Age: 0 years</span>
      </div>
      <button id="ageBtn" class="age-button">AGE</button>
    </div>

    <div class="game-card">
      <div id="eventText" class="event-log">
        I was born. A new life begins.
      </div>

      <div id="choices" class="choices"></div>

      <div class="stats-panel">
        <div class="stat-row">
          <span class="stat-label">Happiness</span>
          <div class="stat-bar">
            <div class="stat-fill" id="stat-happiness"></div>
          </div>
          <span class="stat-value" id="stat-happiness-text">50%</span>
        </div>

        <div class="stat-row">
          <span class="stat-label">Health</span>
          <div class="stat-bar">
            <div class="stat-fill" id="stat-health"></div>
          </div>
          <span class="stat-value" id="stat-health-text">50%</span>
        </div>

        <div class="stat-row">
          <span class="stat-label">Smarts</span>
          <div class="stat-bar">
            <div class="stat-fill" id="stat-smarts"></div>
          </div>
          <span class="stat-value" id="stat-smarts-text">50%</span>
        </div>

        <div class="stat-row">
          <span class="stat-label">Looks</span>
          <div class="stat-bar">
            <div class="stat-fill" id="stat-looks"></div>
          </div>
          <span class="stat-value" id="stat-looks-text">50%</span>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-btn tabBtn" data-tab="personal">Infant</button>
      <button class="nav-btn tabBtn" data-tab="assets">Assets</button>
      <button class="nav-btn tabBtn" data-tab="relationships">Relationships</button>
      <button class="nav-btn tabBtn" data-tab="activities">Activities</button>
    </div>

    <div id="tabContent" class="tab-content">
      <div id="personal" class="tab active">
        <p>Basic info and stats will appear here.</p>
      </div>
      <div id="assets" class="tab">
        <p>Your assets will appear here.</p>
      </div>
<!-- Relationships tab content -->
<div id="relationships" class="tab">
  <h3>Family</h3>
  <div id="familyList"></div>

  <h3>Friends</h3>
  <div id="friendsList"></div>

  <h3>Romantic</h3>
  <div id="romanticList"></div>

  <h3>Pets</h3>
  <div id="petsList"></div>
</div>

<!-- Popup overlay -->
<div id="popup" class="popupOverlay"></div>
      
      <div id="activities" class="tab">
        <p>Available activities will appear here.</p>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
